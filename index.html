<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MPS Geismar | CMMS</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      background-color: #f4f6f8;
      min-height: 100vh;
    }
    .sidebar {
      min-height: calc(100vh - 56px);
      background-color: #ffffff;
      border-right: 1px solid #dee2e6;
    }
    .sidebar .nav-link {
      cursor: pointer;
    }
    .sidebar .nav-link.active {
      background-color: #0d6efd;
      color: #fff;
    }
    .module-header {
      border-bottom: 1px solid #dee2e6;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
    }
    .table thead th {
      text-transform: uppercase;
      font-size: 0.75rem;
      background-color: #f1f3f5;
    }
  </style>
</head>

<body>

<!-- Top Navbar -->
<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand mb-0 h5">
    MPS Geismar — Maintenance CMMS
  </span>
</nav>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar Navigation -->
    <aside class="col-md-2 sidebar p-3">
      <h6 class="text-muted mb-3">Modules</h6>
      <nav class="nav flex-column">
        <a class="nav-link active">Parts Management</a>
        <a class="nav-link">Work Orders</a>
        <a class="nav-link">Administration</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="col-md-10 p-4">

      <!-- =====================
           PARTS MANAGEMENT
           ===================== -->
      <section>

        <div class="module-header d-flex justify-content-between align-items-center">
          <h4>Parts Management</h4>
          <div>
            <button class="btn btn-sm btn-outline-primary me-2">
              Issue Part
            </button>
            <button class="btn btn-sm btn-outline-success">
              Receive Part
            </button>
          </div>
        </div>

        <!-- Filters -->
        <div class="row mb-3">
          <div class="col-md-4">
            <input
              type="text"
              class="form-control form-control-sm"
              placeholder="Search part number or description"
            />
          </div>
          <div class="col-md-3">
            <select class="form-select form-select-sm">
              <option selected>All Locations</option>
              <option>Warehouse</option>
              <option>Tool Crib</option>
            </select>
          </div>
        </div>

        <!-- Parts Table -->
        <div class="card shadow-sm">
          <div class="card-body p-0">
            <table class="table table-sm table-hover mb-0">
              <thead>
                <tr>
                  <th>Part #</th>
                  <th>Description</th>
                  <th>Manufacturer</th>
                  <th>On Hand</th>
                  <th>Reorder Level</th>
                  <th>Location</th>
                </tr>
              </thead>
              <tbody>
                <tr class="table-warning">
