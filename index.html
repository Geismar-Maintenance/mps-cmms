<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MPS Geismar | Maintenance Portal</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      background-color: #f4f6f8;
      min-height: 100vh;
    }
    .nav-link {
      cursor: pointer;
    }
    .table thead th {
      text-transform: uppercase;
      font-size: 0.8rem;
      background-color: #f1f3f5;
    }
  </style>
</head>

<body>
  <!-- Header -->
  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand mb-0 h1">
      MPS Geismar – Maintenance CMMS
    </span>
  </nav>

  <div class="container-fluid mt-4">
    <div class="row">
      <!-- Sidebar -->
      <aside class="col-md-2 mb-3">
        <div class="list-group">
          <a class="list-group-item list-group-item-action active" onclick="loadParts()">
            Parts
          </a>
          <a class="list-group-item list-group-item-action disabled">
            Work Orders (coming)
          </a>
          <a class="list-group-item list-group-item-action disabled">
            Locations (coming)
          </a>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="col-md-10">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 id="module-title" class="mb-3">Parts Inventory</h5>

            <div id="table-container">
              <div class="text-muted">Loading…</div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Scripts -->
  <script src="app.js"></script>
</body>
</html>
