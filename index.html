<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPS CMMS - Maintenance Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #app-body { display: none; padding: 20px; }
        .active-app #app-body { display: block; }
        .active-app #login-screen { display: none; }
        #login-screen { padding-top: 100px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="container" id="neon-auth-ui">
            <div class="text-center">
                <div class="spinner-border text-primary" role="status"></div>
                <p>Connecting to MPS Database...</p>
            </div>
        </div>
    </div>

    <div id="app-body">
        <nav class="navbar navbar-dark bg-dark mb-4">
            <div class="container-fluid">
                <span class="navbar-brand">MPS Inventory & Work Orders</span>
                <button class="btn btn-outline-light btn-sm" id="signOut">Logout</button>
            </div>
        </nav>

        <div class="container-fluid">
            <div class="row">
                <div class="col-md-12">
                    <div class="card shadow-sm">
                        <div class="card-header bg-primary text-white">Open Work Orders</div>
                        <div class="card-body">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>WO #</th>
                                        <th>Asset ID</th>
                                        <th>Description</th>
                                        <th>Priority</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="wo-table-body">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
