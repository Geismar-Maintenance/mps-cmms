<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MPS Geismar | Maintenance Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --sidebar-width: 250px; }
        body { background-color: #f4f7f6; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: var(--sidebar-width); background: #2c3e50; color: white; flex-shrink: 0; display: flex; flex-direction: column; }
        #main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .nav-link { color: #bdc3c7; cursor: pointer; padding: 12px 20px; }
        .nav-link:hover, .nav-link.active { background: #34495e; color: white; }
        #data-table-container { padding: 20px; overflow-y: auto; flex-grow: 1; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

<div id="login-overlay" class="position-fixed w-100 h-100 bg-dark d-flex align-items-center justify-content-center" style="z-index: 1050;">
    <div class="card p-4 shadow" style="width: 350px;">
        <h5 class="text-center mb-3">Geismar Node Login</h5>
        <input type="password" id="db-password" class="form-control mb-3" placeholder="npg_ password">
        <button id="btn-connect" class="btn btn-primary w-100">Connect to Database</button>
        <div id="login-error" class="text-danger small mt-2 text-center"></div>
    </div>
</div>

<div id="sidebar">
    <div class="p-4 border-bottom border-secondary">
        <h5 class="mb-0">MPS Geismar</h5>
    </div>
    <nav class="nav flex-column mt-2">
        <a class="nav-link active" onclick="loadModuleData('parts')"><i class="bi bi-box-seam me-2"></i> Master Parts</a>
        <a class="nav-link" onclick="loadModuleData('work-orders')"><i class="bi bi-tools me-2"></i> Work Orders</a>
        <a class="nav-link" onclick="loadModuleData('locations')"><i class="bi bi-geo-alt me-2"></i> Bin Locations</a>
    </nav>
    <div class="mt-auto p-3 border-top border-secondary small">
        <span id="db-status-dot" class="status-dot bg-danger"></span> 
        <span id="db-status-text">Disconnected</span>
    </div>
</div>

<div id="main-content">
    <header class="bg-white border-bottom p-3 d-flex justify-content-between align-items-center shadow-sm">
        <h4 id="module-title" class="mb-0 text-uppercase">Inventory</h4>
        <button class="btn btn-sm btn-success" onclick="alert('Add Part logic coming soon')">+ New Part</button>
    </header>
    <div id="data-table-container">
        </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
