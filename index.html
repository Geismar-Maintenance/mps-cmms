<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MPS Geismar | Maintenance Node</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --mps-blue: #004a99; --sidebar-width: 260px; }
        body { background-color: #f8f9fa; height: 100vh; overflow: hidden; display: flex; }
        #sidebar { width: var(--sidebar-width); background: #212529; display: flex; flex-direction: column; flex-shrink: 0; }
        #main-wrapper { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .nav-link { color: #adb5bd; font-size: 0.9rem; padding: 0.5rem 1.5rem !important; }
        .nav-link:hover, .nav-link.active { color: white; background: rgba(255,255,255,0.1); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        #data-container { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .accordion-button::after { filter: invert(1); }
    </style>
</head>
<body>

<div id="login-overlay" class="position-fixed w-100 h-100 bg-dark d-flex align-items-center justify-content-center" style="z-index: 9999;">
    <div class="card p-4 shadow-lg" style="width: 350px;">
        <div class="text-center mb-3"><i class="bi bi-shield-lock fs-1 text-primary"></i><h5>Geismar Node Access</h5></div>
        <input type="password" id="db-password" class="form-control mb-3" placeholder="Enter npg_ password...">
        <button id="btn-connect" class="btn btn-primary w-100">Connect</button>
        <div id="login-error" class="text-danger small mt-2 text-center"></div>
    </div>
</div>

<div id="sidebar">
    <div class="p-4 text-white border-bottom border-secondary mb-2">
        <h5 class="mb-0 fw-bold">MPS GEISMAR</h5>
        <small class="text-muted">Maintenance Portal</small>
    </div>
    <div class="accordion accordion-flush" id="navAccordion">
        <div class="accordion-item bg-transparent border-0">
            <h2 class="accordion-header"><button class="accordion-button bg-transparent text-white collapsed shadow-none" data-bs-toggle="collapse" data-bs-target="#menuParts">PARTS MGMT</button></h2>
            <div id="menuParts" class="accordion-collapse collapse" data-bs-parent="#navAccordion">
                <nav class="nav flex-column"><a class="nav-link" href="#" onclick="showModule('parts')">Inventory</a><a class="nav-link" href="#" onclick="openModal('receive-part')">Receive (+)</a><a class="nav-link" href="#" onclick="openModal('issue-part')">Issue (-)</a></nav>
            </div>
        </div>
        <div class="accordion-item bg-transparent border-0">
            <h2 class="accordion-header"><button class="accordion-button bg-transparent text-white collapsed shadow-none" data-bs-toggle="collapse" data-bs-target="#menuWO">WO MGMT</button></h2>
            <div id="menuWO" class="accordion-collapse collapse" data-bs-parent="#navAccordion">
                <nav class="nav flex-column"><a class="nav-link" href="#" onclick="showModule('wo-search')">WO Search</a><a class="nav-link" href="#" onclick="openModal('create-wo')">Create WO</a></nav>
            </div>
        </div>
        <div class="accordion-item bg-transparent border-0">
            <h2 class="accordion-header"><button class="accordion-button bg-transparent text-white collapsed shadow-none" data-bs-toggle="collapse" data-bs-target="#menuAdmin">ADMIN</button></h2>
            <div id="menuAdmin" class="accordion-collapse collapse" data-bs-parent="#navAccordion">
                <nav class="nav flex-column"><a class="nav-link fw-bold" href="#" onclick="openModal('add-part')">Add New Part</a><a class="nav-link" href="#" onclick="showModule('locations')">Locations</a></nav>
            </div>
        </div>
    </div>
    <div class="mt-auto p-3 border-top border-secondary bg-dark text-muted small">
        <div id="db-status-dot" class="status-dot bg-danger me-1"></div> <span id="db-status-text">Disconnected</span>
    </div>
</div>

<div id="main-wrapper">
    <header class="bg-white border-bottom p-3 d-flex justify-content-between align-items-center">
        <h4 id="module-title" class="mb-0 fw-light text-uppercase">Inventory</h4>
        <input type="text" id="global-search" class="form-control form-control-sm w-25" placeholder="Search..." onkeyup="filterTable()">
    </header>
    <div id="data-container"><div id="data-table-container"></div></div>
</div>

<div class="modal fade" id="actionModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header bg-dark text-white"><h5 class="modal-title" id="modal-title-text">Action</h5><button class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
        <div class="modal-body" id="modal-body-content"></div>
        <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button id="modal-submit-btn" class="btn btn-primary">Process</button></div>
    </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
