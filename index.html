<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPS Geismar - Secure Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { height: 100vh; background: #004a99; color: white; position: fixed; width: 250px; z-index: 1000; }
        .main-content { margin-left: 250px; padding: 30px; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="card shadow-lg" style="width: 350px;">
            <div class="card-body text-center p-4">
                <i class="bi bi-shield-lock text-primary fs-1"></i>
                <h5 class="mt-3">Geismar System Access</h5>
                <p class="text-muted small">Enter Database Password to Connect</p>
                <input type="password" id="db-password" class="form-control mb-3" placeholder="npg_xxxx...">
                <button class="btn btn-primary w-100" id="btn-connect">Connect to Node</button>
                <div id="login-error" class="text-danger small mt-2"></div>
            </div>
        </div>
    </div>

    <div class="sidebar d-flex flex-column p-3">
        <h4 class="text-center mb-4 fw-bold">MPS GEISMAR</h4>
        <ul class="nav nav-pills flex-column mb-auto">
            <li><a class="nav-link text-white active" onclick="showModule('parts')"><i class="bi bi-box-seam me-2"></i> Master Parts</a></li>
            <li><a class="nav-link text-white" onclick="showModule('work-orders')"><i class="bi bi-tools me-2"></i> Work Orders</a></li>
            <li><a class="nav-link text-white" onclick="showModule('assets')"><i class="bi bi-cpu me-2"></i> Assets</a></li>
        </ul>
        <div class="p-3 border-top border-secondary small">
            <i class="bi bi-circle-fill text-secondary me-2" id="db-status-dot"></i>
            <span id="db-status-text">Disconnected</span>
        </div>
    </div>

    <main class="main-content">
        <h2 id="module-title" class="fw-bold mb-4">Master Parts</h2>
        <div class="card shadow-sm border-0">
            <div id="data-table-container" class="table-responsive" style="min-height: 400px;">
                <div class="p-5 text-center text-muted">Waiting for authentication...</div>
            </div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
    <script>
        function showModule(moduleId) {
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('module-title').innerText = moduleId.replace('-', ' ').toUpperCase();
            if (window.loadModuleData) window.loadModuleData(moduleId);
        }
    </script>
</body>
</html>
