<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPS Geismar - Maintenance Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .sidebar { height: 100vh; background: #004a99; color: white; position: fixed; width: 260px; z-index: 100; }
        .sidebar .nav-link { color: rgba(255,255,255,0.7); margin: 4px 15px; border-radius: 8px; transition: 0.2s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,0.15); color: white; }
        .main-content { margin-left: 260px; padding: 40px; }
        .card { border: none; border-radius: 12px; }
        .status-box { font-size: 0.75rem; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="sidebar d-flex flex-column">
        <div class="p-4 text-center">
            <h5 class="fw-bold mb-0">MPS GEISMAR</h5>
            <small class="text-white-50">Maintenance Systems</small>
        </div>
        
        <ul class="nav nav-pills flex-column mb-auto">
            <li><a href="#" class="nav-link active" onclick="showModule('parts')"><i class="bi bi-box-seam me-2"></i> Master Parts</a></li>
            <li><a href="#" class="nav-link" onclick="showModule('work-orders')"><i class="bi bi-file-earmark-text me-2"></i> Work Orders</a></li>
            <li><a href="#" class="nav-link" onclick="showModule('assets')"><i class="bi bi-building-gear me-2"></i> Assets</a></li>
            <li><a href="#" class="nav-link" onclick="showModule('locations')"><i class="bi bi-geo-alt me-2"></i> Part Locations</a></li>
            <li><a href="#" class="nav-link" onclick="showModule('technicians')"><i class="bi bi-person-badge me-2"></i> Technicians</a></li>
        </ul>

        <div class="status-box mt-auto">
            <div class="d-flex align-items-center">
                <i class="bi bi-circle-fill text-secondary me-2" id="db-status-dot" style="font-size: 8px;"></i>
                <span id="db-status-text">System Initializing...</span>
            </div>
        </div>
    </div>

    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 id="module-title" class="fw-bold text-dark">Master Parts</h3>
            <button class="btn btn-primary shadow-sm" onclick="openCreateModal()">+ Add Entry</button>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div id="data-table-container" class="table-responsive" style="min-height: 300px;">
                    <div class="p-5 text-center text-muted">
                        <div class="spinner-border spinner-border-sm me-2"></div> Connecting to Geismar Data Node...
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
    <script>
        function showModule(moduleKey) {
            // UI Toggle
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            const titles = {
                'parts': 'Master Parts',
                'work-orders': 'Work Orders',
                'assets': 'Assets',
                'locations': 'Part Locations',
                'technicians': 'Technicians'
            };
            document.getElementById('module-title').innerText = titles[moduleKey];
            
            // Trigger Data Load
            if (window.loadModuleData) window.loadModuleData(moduleKey);
        }
        
        function openCreateModal() {
            alert("Record creation will be enabled once read-only verification is complete.");
        }
    </script>
</body>
</html>
