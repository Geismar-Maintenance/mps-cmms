<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPS Geismar - Maintenance Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; }
        .sidebar { height: 100vh; background: #004a99; color: white; position: fixed; width: 250px; }
        .sidebar .nav-link { color: rgba(255,255,255,0.8); margin: 5px 15px; border-radius: 5px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,0.1); color: white; }
        .main-content { margin-left: 250px; padding: 30px; }
        .status-indicator { font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="sidebar d-flex flex-column p-3">
        <h4 class="text-center mb-4">MPS Geismar</h4>
        <ul class="nav nav-pills flex-column mb-auto">
            <li><a href="#" class="nav-link active" onclick="showModule('parts')"><i class="bi bi-box-seam me-2"></i> Parts Management</a></li>
            <li><a href="#" class="nav-link" onclick="showModule('work-orders')"><i class="bi bi-tools me-2"></i> WO Management</a></li>
            <li><a href="#" class="nav-link" onclick="showModule('assets')"><i class="bi bi-cpu me-2"></i> Asset Management</a></li>
            <li><a href="#" class="nav-link" onclick="showModule('locations')"><i class="bi bi-geo-alt me-2"></i> Locations</a></li>
            <li><a href="#" class="nav-link" onclick="showModule('technicians')"><i class="bi bi-people me-2"></i> Technicians</a></li>
        </ul>
        <hr>
        <div class="status-indicator">
            <i class="bi bi-circle-fill text-secondary me-1" id="db-status-dot"></i>
            <span id="db-status-text">Connecting to Neon...</span>
        </div>
    </div>

    <main class="main-content">
        <div id="module-container">
            <h2 id="module-title">Parts Management</h2>
            <div class="card shadow-sm mt-4">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <span id="data-count">Loading records...</span>
                    <button class="btn btn-primary btn-sm" onclick="openCreateModal()">+ Add New</button>
                </div>
                <div class="card-body p-0">
                    <div id="data-table-container" class="table-responsive">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
    <script>
        // UI Navigation Logic
        function showModule(moduleId) {
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            event.currentTarget.classList.add('active');
            const titles = {
                'parts': 'Parts Management',
                'work-orders': 'Work Order Management',
                'assets': 'Asset Management',
                'locations': 'Location Management',
                'technicians': 'Technician Management'
            };
            document.getElementById('module-title').innerText = titles[moduleId];
            window.loadModuleData(moduleId);
        }

        function openCreateModal() {
            alert("Create feature coming once connection is confirmed!");
        }
    </script>
</body>
</html>
