  <style>
    body {

      min-height: calc(100vh - 56px);

      cursor: pointer;
      color: #333;

    }

    .module-header {
      border-bottom: 1px solid #dee2e6;
      padding-bottom: 0.5rem;
      margin-bottom: 1rem;
    }

    .table thead th {
      text-transform: uppercase;
      font-size: 0.75rem;
      background-color: #f1f3f5;
    }

    .module {
      display: none;
    }

    .module.active {
      display: block;
    }
