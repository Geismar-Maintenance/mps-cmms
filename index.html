<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPS Geismar - Secure Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { height: 100vh; background: #004a99; color: white; position: fixed; width: 250px; z-index: 1000; }
        .main-content { margin-left: 250px; padding: 30px; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="card shadow-lg" style="width: 350px;">
            <div class="card-body text-center p-4">
                <i class="bi bi-shield-lock text-primary fs-1"></i>
                <h5 class="mt-3">Geismar System Access</h5>
                <p class="text-muted small">Enter Database Password to Connect</p>
                <input type="password" id="db-password" class="form-control mb-3" placeholder="npg_xxxx...">
                <button class="btn btn-primary w-100" id="btn-connect">Connect to Node</button>
                <div id="login-error" class="text-danger small mt-2"></div>
            </div>
        </div>
    </div>

    <div class="accordion accordion-flush" id="navAccordion">
    
    <div class="accordion-item bg-transparent border-0">
        <h2 class="accordion-header">
            <button class="accordion-button bg-transparent text-white collapsed shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#menuParts">
                <i class="bi bi-box-seam me-2 text-primary"></i> PARTS MANAGEMENT
            </button>
        </h2>
        <div id="menuParts" class="accordion-collapse collapse" data-bs-parent="#navAccordion">
            <nav class="nav flex-column ms-3">
                <a class="nav-link py-1" href="#" onclick="showModule('parts')">Master Inventory</a>
                <a class="nav-link py-1 text-info" href="#" onclick="openModal('receive-part')"><i class="bi bi-plus-sm"></i> Receive Stock (+)</a>
                <a class="nav-link py-1 text-warning" href="#" onclick="openModal('issue-part')"><i class="bi bi-dash-sm"></i> Issue Part (-)</a>
            </nav>
        </div>
    </div>

    <div class="accordion-item bg-transparent border-0">
        <h2 class="accordion-header">
            <button class="accordion-button bg-transparent text-white collapsed shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#menuWO">
                <i class="bi bi-tools me-2 text-warning"></i> WO MANAGEMENT
            </button>
        </h2>
        <div id="menuWO" class="accordion-collapse collapse" data-bs-parent="#navAccordion">
            <nav class="nav flex-column ms-3">
                <a class="nav-link py-1" href="#" onclick="showModule('wo-search')">WO Search</a>
                <a class="nav-link py-1" href="#" onclick="openModal('create-wo')">Create Work Order</a>
                <a class="nav-link py-1" href="#" onclick="openModal('close-wo')">Close Work Order</a>
            </nav>
        </div>
    </div>

    <div class="accordion-item bg-transparent border-0">
        <h2 class="accordion-header">
            <button class="accordion-button bg-transparent text-white collapsed shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#menuAdmin">
                <i class="bi bi-shield-check me-2 text-info"></i> ADMIN
            </button>
        </h2>
        <div id="menuAdmin" class="accordion-collapse collapse" data-bs-parent="#navAccordion">
            <nav class="nav flex-column ms-3">
                <a class="nav-link py-1 fw-bold text-white" href="#" onclick="openModal('add-part')"><i class="bi bi-database-add me-1"></i> Add New Part</a>
                <a class="nav-link py-1" href="#" onclick="showModule('technicians')">Technician Mgmt</a>
                <a class="nav-link py-1" href="#" onclick="showModule('locations')">Location Mgmt (100.100.x)</a>
                <a class="nav-link py-1" href="#" onclick="showModule('assets')">Asset Registry</a>
            </nav>
        </div>
    </div>

    <main class="main-content">
        <h2 id="module-title" class="fw-bold mb-4">Master Parts</h2>
        <div class="card shadow-sm border-0">
            <div id="data-table-container" class="table-responsive" style="min-height: 400px;">
                <div class="p-5 text-center text-muted">Waiting for authentication...</div>
            </div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
    <script>
        function showModule(moduleId) {
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('module-title').innerText = moduleId.replace('-', ' ').toUpperCase();
            if (window.loadModuleData) window.loadModuleData(moduleId);
        }
    </script>
</body>
</html>
