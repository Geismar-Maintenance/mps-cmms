<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPS-CMMS | Operations Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --sidebar-width: 260px; }
        body { background-color: #f4f7f6; overflow-x: hidden; font-family: system-ui, -apple-system, sans-serif; }
        #sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; background: #1a1d20; color: #fff; z-index: 1000; }
        #main-content { margin-left: var(--sidebar-width); padding: 30px; min-height: 100vh; }
        .nav-link { color: #adb5bd; transition: 0.2s; cursor: pointer; border-radius: 5px; margin: 2px 0; }
        .nav-link:hover, .nav-link.active { color: #fff; background: #343a40; }
        .module-section { display: none; animation: fadeIn 0.3s; }
        .module-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #auth-overlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); transition: opacity 0.3s; }
    </style>
</head>
<body>

    <div id="auth-overlay" class="position-fixed w-100 h-100 d-flex align-items-center justify-content-center" style="z-index: 9999;">
        <div class="card shadow-lg border-0" style="width: 400px;">
            <div class="card-body text-center p-4">
                <i class="bi bi-shield-lock-fill text-primary display-4 mb-3"></i>
                <h4 class="fw-bold">MPS-CMMS Access</h4>
                <p class="text-muted small mb-4">Please enter your Neon Service Role JWT to connect to the database.</p>
                
                <div class="text-start mb-3">
                    <label for="db-token-input" class="form-label small fw-bold">Database Token</label>
                    <input type="password" id="db-token-input" class="form-control form-control-lg" placeholder="Paste Neon JWT here...">
                </div>
                
                <button class="btn btn-primary btn-lg w-100 shadow-sm" onclick="authenticate()">
                    <i class="bi bi-cloud-check me-2"></i>Connect to Neon
                </button>
            </div>
        </div>
    </div>

    <nav id="sidebar" class="d-flex flex-column p-3 shadow">
        <div class="text-center mb-4">
            <h4 class="fw-bold text-primary">MPS-CMMS</h4>
            <span class="badge bg-secondary">Operations Portal</span>
        </div>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a class="nav-link active" onclick="showModule('wo-mgmt')" role="button">
                    <i class="bi bi-tools me-2"></i> WO Management
                </a>
            </li>
            <li>
                <a class="nav-link" onclick="showModule('asset-mgmt')" role="button">
                    <i class="bi bi-box-seam me-2"></i> Asset Management
                </a>
            </li>
            <li>
                <a class="nav-link" onclick="showModule('part-mgmt')" role="button">
                    <i class="bi bi-gear-wide-connected me-2"></i> Part Management
                </a>
            </li>
            <li>
                <a class="nav-link" onclick="showModule('loc-mgmt')" role="button">
                    <i class="bi bi-geo-alt me-2"></i> Location Management
                </a>
            </li>
            <li>
                <a class="nav-link" onclick="showModule('tech-mgmt')" role="button">
                    <i class="bi bi-person-badge me-2"></i> Technicians
                </a>
            </li>
        </ul>
        <hr>
        <div class="small text-muted text-center py-2">
            Status: <span class="text-success"><i class="bi bi-circle-fill small me-1"></i> Online</span>
        </div>
    </nav>

    <main id="main-content">
        <header class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <h2 id="module-title" class="fw-bold m-0">Work Order Management</h2>
            <button class="btn btn-primary shadow-sm px-4" onclick="openCreateModal()">
                <i class="bi bi-plus-lg me-2"></i>Add New Record
            </button>
        </header>

        <section id="wo-mgmt" class="module-section active">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr><th>WO#</th><th>Asset</th><th>Description</th><th>Priority</th><th>Status</th><th>Due</th><th>Actions</th></tr>
                            </thead>
                            <tbody id="wo-table-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <section id="part-mgmt" class="module-section">
            <div class="card border-0 shadow-sm">
                <div class
